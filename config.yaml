# Bots (机器人配置)
bots:
  - name: "my-bot"
    wecom_bot_id: "aibDKL2cTKOzrES6hhm_nhF4bHJjjIor8Cj"
    wecom_secret: "eOtECozizpAvFj5vY1HwFuiNZAVx164Qv59yIamUWnm"
    llm_provider_id: "default"
    llm_model: "gpt-4o"
    llm_temperature: 0.7
    llm_max_tokens: 2048
    max_session_tokens: 4096
    skills:
      - name: "gh-trending"
        description: "使用 curl 获取 GitHub 最近一周涨星最快的 Top 10 项目，包含项目名称、地址和描述。当要求你获取github最近涨星趋势时使用。"
        system_prompt: '---name:gh-trendingdescription:使用curl获取GitHub最近一周涨星最快的Top10项目，包含项目名称、地址和描述。当要求你获取github最近涨星趋势时使用。metadata:author:heblversion:\"1.0\"---使用`curl`获取[GitHubTrending](https://github.com/trending?since=weekly)页面，解析出最近一周涨星最快的10个仓库，按涨星数降序排列，返回项目名称、项目地址、项目描述。##用法直接运行以下命令（依赖`python3`）：```bashcurl-s\"https://github.com/trending?since=weekly\"|python3-c\"importsys,re,htmlcontent=sys.stdin.read()articles=re.findall(r''<article[^>]*class=\"Box-row\"[^>]*>(.*?)</article>'',content,re.DOTALL)print(''GitHub最近一周涨星Top10'')print(''=''*60)fori,ainenumerate(articles[:10]):title=re.search(r''<h[23][^>]*class=\"h3[^\"]*\"[^>]*>.*?<a[^>]*href=\"/([^\"]+)\"[^>]*>.*?</h[23]>'',a,re.DOTALL)repo=title.group(1)iftitleelse''N/A''desc_m=re.search(r''<p[^>]*class=\"col-9[^\"]*color-fg-muted[^\"]*\"[^>]*>(.*?)</p>'',a,re.DOTALL)desc=re.sub(r''<[^>]+>'','''',desc_m.group(1)).strip()ifdesc_melse''(无描述)''stars_all=re.findall(r''class=\"[^\"]*octicon-star[^\"]*\"[^>]*>.*?</svg>\s*([\d,]+)'',a,re.DOTALL)total=stars_all[0]iflen(stars_all)>0else''N/A''period=stars_all[1]iflen(stars_all)>1else''N/A''print(f''{i+1:2d}.{repo}'')print(f''📍https://github.com/{repo}'')print(f''📝{html.unescape(desc)}'')print(f''⭐总Stars:{total}|本周新增:{period}'')print()\"```>**注意**：GitHubTrending页面本身已按涨星速度排序（`since=weekly`），所以结果直接就是最近一周涨星最快的项目。##输出示例```GitHub最近一周涨星Top10============================================================1.NVIDIA/SkillSpector📍https://github.com/NVIDIA/SkillSpector📝SecurityscannerforAIagentskills.Detectvulnerabilities...⭐总Stars:8,352|本周新增:5,0262.iptv-org/iptv📍https://github.com/iptv-org/iptv📝CollectionofpubliclyavailableIPTVchannelsfromallovertheworld⭐总Stars:125,850|本周新增:8,035...```##依赖-`curl`-发送HTTP请求-`python3`-解析HTML（标准库，无需额外安装）'
        tools: "[]"
